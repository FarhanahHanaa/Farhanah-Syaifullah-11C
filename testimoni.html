<div class="testi-wrapper">
    <div class="testi-container">
        <div class="testi-header">
            <h2>Suara Pembeli</h2>
            <p>Bagikan kesan Anda setelah berbelanja di Whispering Pages</p>
        </div>
        
        <form id="feedbackForm" class="testi-form">
            <div class="input-row">
                <div class="input-field">
                    <label>Nama Anda</label>
                    <input type="text" placeholder="Nama Anda" required>
                </div>
                <div class="input-field">
                    <label>Judul Buku</label>
                    <input type="text" placeholder="Judul Buku" required>
                </div>
            </div>

            <div class="input-field">
                <label>Rating Pengalaman</label>
                <div class="star-rating">
                    <input type="radio" name="stars" id="star-5" value="5"><label for="star-5">★</label>
                    <input type="radio" name="stars" id="star-4" value="4"><label for="star-4">★</label>
                    <input type="radio" name="stars" id="star-3" value="3"><label for="star-3">★</label>
                    <input type="radio" name="stars" id="star-2" value="2"><label for="star-2">★</label>
                    <input type="radio" name="stars" id="star-1" value="1"><label for="star-1">★</label>
                </div>
            </div>

            <div class="input-field">
                <label>Ulasan Anda</label>
                <textarea rows="5" placeholder="Tuliskan pengalaman Anda membaca atau layanan kami..."></textarea>
            </div>

            <button type="submit" class="btn-kirim">Kirim Testimoni Sekarang</button>
        </form>
    </div>
</div>
